<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>FFXI Macro Viewer</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>

    <li>Augment data is not included in the source files and therefore not supported.</li>
    <li>Some layouts may appear misaligned on narrow mobile screens.</li>
    <li style="margin-top:10px; font-size:12px; opacity:0.7;">
      Based on  
      <a href="https://github.com/hamham-fenrir/macroweb" target="_blank">macroweb</a>.
    </li>
  </ul>

  <button id="tocToggleBtn">Table of Contents</button>

    <div id="modal-content"></div>
  </div>

  <button id="scrollTopBtn">↑</button>
